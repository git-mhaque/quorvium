name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

  docker-publish:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      IMAGE_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: |
          HOST="$(echo "${IMAGE_REPO}" | cut -d'/' -f1)"
          gcloud auth configure-docker "${HOST}" --quiet

      - name: Build container image
        env:
          IMAGE_URI: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
        run: |
          docker build \
            --file Dockerfile \
            --tag "${IMAGE_URI}" \
            .

      - name: Push container image
        id: push
        env:
          IMAGE_URI: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
        run: |
          docker push "${IMAGE_URI}"
          DIGEST="$(docker image inspect "${IMAGE_URI}" --format '{{index .RepoDigests 0}}')"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Emit Terraform image hint
        env:
          IMAGE_URI: ${{ steps.push.outputs.image_uri }}
          IMAGE_DIGEST: ${{ steps.push.outputs.image_digest }}
        run: |
          printf 'Image pushed: %s\nDigest: %s\n' "${IMAGE_URI}" "${IMAGE_DIGEST}"

  deploy-client-staging:
    name: Deploy Client (staging)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: staging
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
      VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
      STAGING_BUCKET: ${{ secrets.STAGING_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build client bundle
        run: npm run build --workspace=client

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gsutil
        run: gcloud components install gsutil --quiet

      - name: Sync bundle to staging bucket
        run: |
          if [ -z "${STAGING_BUCKET}" ]; then
            echo "STAGING_BUCKET secret is not set" >&2
            exit 1
          fi
          gsutil -m rsync -d -r client/dist "${STAGING_BUCKET}"
