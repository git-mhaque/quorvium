name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

  docker-publish:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
      image_digest: ${{ steps.push.outputs.image_digest }}
    permissions:
      contents: read
    env:
      IMAGE_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: |
          HOST="$(echo "${IMAGE_REPO}" | cut -d'/' -f1)"
          gcloud auth configure-docker "${HOST}" --quiet

      - name: Build container image
        env:
          IMAGE_URI: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
        run: |
          docker build \
            --file Dockerfile \
            --tag "${IMAGE_URI}" \
            .

      - name: Push container image
        id: push
        env:
          IMAGE_URI: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
        run: |
          docker push "${IMAGE_URI}"
          DIGEST="$(docker image inspect "${IMAGE_URI}" --format '{{index .RepoDigests 0}}')"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Emit image details
        env:
          IMAGE_URI: ${{ steps.push.outputs.image_uri }}
          IMAGE_DIGEST: ${{ steps.push.outputs.image_digest }}
        run: |
          printf 'Image pushed: %s\nDigest: %s\n' "${IMAGE_URI}" "${IMAGE_DIGEST}"

  deploy-api-staging:
    name: Deploy API (staging)
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
      CLIENT_ORIGIN: ${{ secrets.CLIENT_ORIGIN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      GOOGLE_CLIENT_SECRET_SECRET_ID: ${{ secrets.GOOGLE_CLIENT_SECRET_SECRET_ID }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate deploy inputs
        run: |
          for key in GCP_PROJECT_ID GCP_REGION CLOUD_RUN_SERVICE ARTIFACT_REGISTRY_REPO CLIENT_ORIGIN GOOGLE_CLIENT_ID GOOGLE_REDIRECT_URI GOOGLE_CLIENT_SECRET_SECRET_ID; do
            if [ -z "${!key}" ]; then
              echo "${key} secret/output is required" >&2
              exit 1
            fi
          done

      - name: Deploy API revision to Cloud Run
        run: |
          IMAGE_URI="${ARTIFACT_REGISTRY_REPO}:${GITHUB_SHA}"
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --image="${IMAGE_URI}" \
            --set-env-vars="NODE_ENV=production,DATA_DIR=/tmp/quorvium-data,CLIENT_ORIGIN=${CLIENT_ORIGIN},GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID},GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}" \
            --set-secrets="GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET_SECRET_ID}:latest" \
            --quiet

  deploy-client-staging:
    name: Deploy Client (staging)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: staging
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
      VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
      STAGING_BUCKET: ${{ secrets.STAGING_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build client bundle
        run: npm run build --workspace=client

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gsutil
        run: gcloud components install gsutil --quiet

      - name: Sync bundle to staging bucket
        run: |
          if [ -z "${STAGING_BUCKET}" ]; then
            echo "STAGING_BUCKET secret is not set" >&2
            exit 1
          fi
          if ! printf '%s' "${STAGING_BUCKET}" | grep -q '^gs://'; then
            echo "STAGING_BUCKET must start with gs:// (received: ${STAGING_BUCKET})" >&2
            exit 1
          fi
          TARGET="${STAGING_BUCKET%/}"
          echo "Syncing client/dist -> ${TARGET}"
          gsutil -m rsync -d -r client/dist "${TARGET}"
